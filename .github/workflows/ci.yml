name: CI

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-static-site:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout website
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build static site
        run: |
          npm ci
          npm run build
          npm run verify:static

      - name: Upload static output
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: dist
